<mat-toolbar>
  <button mat-icon-button>
    <mat-icon color="primary">dashboard</mat-icon>
  </button>
  <span>{{ title }}</span>
  
  <span class="example-spacer">
    <!-- Navigation buttons can be added here -->
    <button mat-button (click)="navigateToSection('profile')">
      <mat-icon>person</mat-icon>
      Profile
    </button>
    <button mat-button (click)="navigateToSection('settings')">
      <mat-icon>settings</mat-icon>
      Settings
    </button>
  </span>

  <button mat-icon-button color="warn" matTooltip="Logout" (click)="logout()">
    <mat-icon>power_settings_new</mat-icon>
  </button>
</mat-toolbar>

<div class="dashboard-container">
  <div class="welcome-section">
    <mat-card class="welcome-card">
      <mat-card-header>
        <mat-card-title>Welcome to {{ title }}</mat-card-title>
        <mat-card-subtitle>Hello, {{ user.name }}!</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>This is your dashboard. You can extend this template with your application-specific features.</p>
        <div class="user-info">
          <p><strong>Email:</strong> {{ user.email }}</p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="actions-section">
    <mat-card class="actions-card">
      <mat-card-header>
        <mat-card-title>Quick Actions</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="action-buttons">
          <button mat-raised-button color="primary" (click)="performAction('create')">
            <mat-icon>add</mat-icon>
            Create New
          </button>
          <button mat-raised-button color="accent" (click)="performAction('manage')">
            <mat-icon>manage_accounts</mat-icon>
            Manage
          </button>
          <button mat-raised-button (click)="performAction('reports')">
            <mat-icon>assessment</mat-icon>
            View Reports
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="stats-section">
    <mat-card class="stats-card">
      <mat-card-header>
        <mat-card-title>Statistics</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="stats-grid">
          <div class="stat-item">
            <mat-icon>trending_up</mat-icon>
            <div class="stat-info">
              <h3>0</h3>
              <p>Total Items</p>
            </div>
          </div>
          <div class="stat-item">
            <mat-icon>people</mat-icon>
            <div class="stat-info">
              <h3>1</h3>
              <p>Active Users</p>
            </div>
          </div>
          <div class="stat-item">
            <mat-icon>notifications</mat-icon>
            <div class="stat-info">
              <h3>0</h3>
              <p>Notifications</p>
            </div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
